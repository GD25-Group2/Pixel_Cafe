name: Build and Release LÖVE Game

on:
  push:
    tags:
      - 'v*' # Triggers the build whenever you push a tag like v1.0.0

jobs:
  build:
    name: Package and Release Game
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permissions to create the release page

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build LÖVE Game Binaries
        uses: nhartland/love-build@v1
        with:
          app_name: "PixelCafe"       # Your final executable name
          love_version: "11.5"        # Your engine version
          source_dir: "./"            # Where your main.lua is located

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}